<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SWM Desk Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(-100%); opacity: 0; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        @keyframes zoomOut {
            from { transform: scale(1); opacity: 1; }
            to { transform: scale(0.8); opacity: 0; }
        }
        .animate-slide-in { animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-slide-out { animation: slideOut 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-out { animation: fadeOut 0.5s ease-out forwards; }
        .animate-zoom-out { animation: zoomOut 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    </style>
</head>
<body class="bg-transparent overflow-hidden w-screen h-screen m-0 p-12 flex items-end justify-start select-none pointer-events-none">
    <div id="overlay-container" class="opacity-0 transition-all duration-500"></div>
    <script>
        const container = document.getElementById("overlay-container");
        let activeData = null;
        let socket = null;
        let reconnectTimeout = null;
        let delay = 1000;

        function updateUI(data) {
            if (!data || !data.isActive) {
                if (activeData && activeData.isActive) {
                    let outClass = "animate-fade-out";
                    if (activeData.styleType === "slide") outClass = "animate-slide-out";
                    else if (activeData.styleType === "zoom") outClass = "animate-zoom-out";
                    container.className = outClass;
                    setTimeout(() => {
                        container.innerHTML = "";
                        container.className = "opacity-0";
                    }, 500);
                }
                activeData = data;
                return;
            }

            activeData = data;
            let inClass = "animate-fade-in";
            if (data.styleType === "slide") inClass = "animate-slide-in";
            else if (data.styleType === "zoom") inClass = "animate-zoom-in";

            let html = "";
            if (data.type === "social") {
                html = `
                    <div class="flex items-center gap-3 px-6 py-4 rounded-xl shadow-2xl backdrop-blur-md max-w-lg border" style="background-color: rgba(15, 23, 42, 0.85); border-color: ${data.themeColor}33; color: #ffffff">
                        <div class="w-12 h-12 rounded-lg flex items-center justify-center text-white font-bold text-xl" style="background-color: ${data.themeColor}">@</div>
                        <div>
                            <div class="font-extrabold text-xl tracking-wide">${data.title}</div>
                            <div class="text-sm opacity-80" style="color: ${data.textColor}">${data.subtitle}</div>
                        </div>
                    </div>
                `;
            } else if (data.type === "banner") {
                html = `
                    <div class="border-l-8 px-8 py-5 shadow-2xl max-w-xl" style="background-color: rgba(9, 9, 11, 0.9); border-left-color: ${data.themeColor}; color: #ffffff">
                        <div class="font-black text-2xl uppercase tracking-wider">${data.title}</div>
                        <div class="text-sm uppercase tracking-widest mt-1" style="color: ${data.themeColor}">${data.subtitle}</div>
                    </div>
                `;
            } else if (data.type === "minimal") {
                html = `
                    <div class="flex flex-col gap-1 px-4 py-2 border-b-2" style="border-color: ${data.themeColor}">
                        <div class="font-semibold text-2xl tracking-tight text-white">${data.title}</div>
                        <div class="text-sm font-medium tracking-wide" style="color: ${data.themeColor}">${data.subtitle}</div>
                    </div>
                `;
            } else {
                html = `
                    <div class="relative pl-6 pr-10 py-5 rounded-r-lg shadow-2xl overflow-hidden max-w-xl" style="background-color: rgba(20, 20, 25, 0.95); color: #ffffff">
                        <div class="absolute left-0 top-0 bottom-0 w-2" style="background-color: ${data.themeColor}"></div>
                        <div class="font-bold text-2xl" style="color: ${data.textColor}">${data.title}</div>
                        <div class="text-base text-gray-300 font-light mt-0.5">${data.subtitle}</div>
                    </div>
                `;
            }

            container.innerHTML = html;
            container.className = inClass;
        }

        function connect() {
            socket = new WebSocket("ws://localhost:4500");
            socket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    updateUI(data);
                    delay = 1000;
                } catch (e) {
                    console.error(e);
                }
            };
            socket.onclose = () => {
                reconnectTimeout = setTimeout(() => {
                    delay = Math.min(delay * 2, 30000);
                    connect();
                }, delay);
            };
            socket.onerror = () => {
                socket.close();
            };
        }

        connect();
    </script>
</body>
</html>
